<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
const ENEMY_ARCHETYPES = [

];

class SoundEngine {
    constructor() {
        this.ctx = null;
        this.enabled = true;
        this.volume = this.readStoredVolume();
    }

    readStoredVolume() {
        try {
            const raw = window.localStorage.getItem('jkp-master-volume');
            if (raw === null) return 0.7;
            const parsed = Number(raw);
            return Number.isFinite(parsed) ? THREE.MathUtils.clamp(parsed, 0, 1) : 0.7;
        } catch {
            return 0.7;
        }
    }

    setVolume(value) {
        this.volume = THREE.MathUtils.clamp(value, 0, 1);
        try {
            window.localStorage.setItem('jkp-master-volume', String(this.volume));
        } catch {}
    }

    getContext() {
        if (this.ctx) return this.ctx;
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return null;
        this.ctx = new Ctx();
        return this.ctx;
    }

    async unlock() {
        const ctx = this.getContext();
        if (!ctx) return;
        if (ctx.state === 'suspended') {
            try { await ctx.resume(); } catch {}
        }
    }

    beep({
        freq = 440,
        duration = 0.12,
        volume = 0.03,
        type = 'triangle',
        slideTo = null,
        delay = 0,
        q = 3
    } = {}) {
        if (!this.enabled || this.volume <= 0.001) return;
        const ctx = this.getContext();
        if (!ctx || ctx.state !== 'running') return;

        const now = ctx.currentTime + delay;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(2800, now);
        filter.Q.value = q;

        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        if (slideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(40, slideTo), now + duration);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(volume * this.volume, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);

        osc.start(now);
        osc.stop(now + duration + 0.03);
    }

    upgrade() {
        this.beep({ freq: 440, slideTo: 700, duration: 0.14, volume: 0.04, type: 'triangle' });
        this.beep({ freq: 660, slideTo: 920, duration: 0.16, volume: 0.03, delay: 0.04, type: 'sine' });
    }

    chest() {
        this.beep({ freq: 620, slideTo: 920, duration: 0.11, volume: 0.035, type: 'triangle' });
        this.beep({ freq: 930, slideTo: 1200, duration: 0.15, volume: 0.025, delay: 0.03, type: 'sine' });
    }

    levelClear() {
        this.beep({ freq: 390, slideTo: 520, duration: 0.14, volume: 0.04 });
        this.beep({ freq: 520, slideTo: 780, duration: 0.18, volume: 0.03, delay: 0.05 });
        this.beep({ freq: 780, slideTo: 1170, duration: 0.24, volume: 0.028, delay: 0.11, type: 'sine' });
    }

    enemyHit(isBoss = false) {
        this.beep({
            freq: isBoss ? 240 : 310,
            slideTo: isBoss ? 120 : 170,
            duration: isBoss ? 0.16 : 0.11,
            volume: isBoss ? 0.05 : 0.032,
            type: 'sawtooth'
        });
    }

    playerHit(isBoss = false) {
        this.beep({
            freq: isBoss ? 180 : 220,
            slideTo: 90,
            duration: isBoss ? 0.22 : 0.16,
            volume: isBoss ? 0.055 : 0.038,
            type: 'square',
            q: 6
        });
    }

    enemyDefeat(isBoss = false) {
        this.beep({ freq: isBoss ? 180 : 260, slideTo: 90, duration: 0.18, volume: 0.04, type: 'sawtooth' });
        this.beep({ freq: isBoss ? 520 : 420, slideTo: isBoss ? 820 : 620, duration: 0.2, volume: 0.03, delay: 0.04, type: 'triangle' });
    }

    bossIntro() {
        this.beep({ freq: 130, slideTo: 100, duration: 0.4, volume: 0.06, type: 'sawtooth', q: 10 });
        this.beep({ freq: 260, slideTo: 190, duration: 0.24, volume: 0.035, delay: 0.06, type: 'square' });
    }

    defeat() {
        this.beep({ freq: 260, slideTo: 110, duration: 0.28, volume: 0.045, type: 'square' });
        this.beep({ freq: 150, slideTo: 70, duration: 0.35, volume: 0.035, delay: 0.08, type: 'sawtooth' });
    }
}

// --- 状态与核心逻辑 ---
const GameState = {
    phase: 'INIT',
    level: 1,
    score: 0,
    player: { lvSpeed: 1, baseSpeed: 0.15, lvAtk: 1, baseAtk: 10, lvHp: 1, baseHp: 50, currentHp: 50 },
    maze: { lvChest: 1, baseChestRate: 0.05, lvMonster: 1, baseMonsterRate: 0.03 },
    costs: {
        speed: () => Math.floor(10 * Math.pow(1.5, GameState.player.lvSpeed - 1)),
        atk: () => Math.floor(20 * Math.pow(1.5, GameState.player.lvAtk - 1)),
        hp: () => Math.floor(20 * Math.pow(1.4, GameState.player.lvHp - 1)),
        chest: () => Math.floor(50 * Math.pow(1.6, GameState.maze.lvChest - 1)),
        monster: () => Math.floor(100 * Math.pow(1.8, GameState.maze.lvMonster - 1))
    },
    isBossUnlocked() {
        return this.maze.lvMonster >= 4;
    },
    getBossFloorChance() {
        if (!this.isBossUnlocked()) return 0;
        return Math.min(0.58, 0.14 + (this.maze.lvMonster - 4) * 0.11);
    },
    addScore(val) {
        this.score += val;
        const el = document.getElementById('ui-score');
        el.innerText = Math.floor(this.score);
        el.style.transform = 'scale(1.2)';
        el.style.color = '#ffffff';
        setTimeout(() => {
            el.style.transform = 'scale(1)';
            el.style.color = '#facc15';
        }, 150);
        this.updateUI();
    },
    tryBuy(type) {
        const cost = this.costs[type]();
        if (this.score < cost) return false;

        this.score -= cost;
        if (type === 'speed') { this.player.lvSpeed++; this.player.baseSpeed = Math.max(0.04, this.player.baseSpeed - 0.015); }
        if (type === 'atk') { this.player.lvAtk++; this.player.baseAtk += 5; }
        if (type === 'hp') { this.player.lvHp++; this.player.baseHp += 20; this.player.currentHp = this.player.baseHp; }
        if (type === 'chest') { this.maze.lvChest++; this.maze.baseChestRate += 0.02; }
        if (type === 'monster') { this.maze.lvMonster++; this.maze.baseMonsterRate += 0.015; }

        this.updateUI();
        window.soundEngine?.upgrade();
        if (window.engine) window.engine.triggerUpgradeEffect();
        return true;
    },
    updateUI() {
        document.getElementById('ui-level').innerText = this.level;
        document.getElementById('rpg-p-lv').innerText = this.player.lvAtk + this.player.lvHp + this.player.lvSpeed;

        const statusSpan = document.getElementById('ui-status');
        const statusBox = document.getElementById('ui-status-box');
        const statusMap = { GENERATING: '挖掘中', EXPLORING: '自动寻路', COMBAT: 'RPG 战斗模式!' };
        statusSpan.innerText = statusMap[this.phase] || '就绪';

        if (this.phase === 'COMBAT') {
            statusBox.className = 'bg-red-900/95 px-4 py-2 rounded-lg border-2 border-red-500 text-sm shadow-[0_4px_0_rgba(153,27,27,1)] animate-pulse';
            statusSpan.className = 'text-white font-bold ml-1';
        } else {
            statusBox.className = 'bg-slate-900/95 px-4 py-2 rounded-lg border-2 border-slate-700 text-sm shadow-[0_4px_0_rgba(0,0,0,0.5)]';
            statusSpan.className = 'text-emerald-400 font-bold ml-1';
        }

        document.getElementById('ui-score').innerText = Math.floor(this.score);
        ['speed', 'atk', 'hp', 'chest', 'monster'].forEach((id) => {
            const lv = this.player[`lv${id.charAt(0).toUpperCase() + id.slice(1)}`] || this.maze[`lv${id.charAt(0).toUpperCase() + id.slice(1)}`];
            const cost = this.costs[id]();
            document.getElementById(`val-${id}`).innerText = `Lv.${lv}`;
            document.getElementById(`cost-${id}`).innerText = cost;
            const btn = document.getElementById(`btn-up-${id}`);
            if (this.score >= cost) btn.classList.remove('opacity-50', 'grayscale');
            else btn.classList.add('opacity-50', 'grayscale');
        });

        const monsterDesc = document.getElementById('desc-monster');
        if (monsterDesc) {
            monsterDesc.innerText = this.isBossUnlocked()
                ? `吸引高收益怪物，Boss 投放率 ${Math.round(this.getBossFloorChance() * 100)}%`
                : '吸引高收益怪物，Lv.4 解锁 Boss';
        }
    }
};

const Easing = {
    linear: (t) => t,
    easeOutQuad: (t) => t * (2 - t),
    easeOutBack: (t) => {
        const c1 = 1.70158;
        const c3 = c1 + 1;
        return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    },
    easeOutBounce: (t) => {
        const n1 = 7.5625;
        const d1 = 2.75;
        if (t < 1 / d1) return n1 * t * t;
        if (t < 2 / d1) { t -= 1.5 / d1; return n1 * t * t + 0.75; }
        if (t < 2.5 / d1) { t -= 2.25 / d1; return n1 * t * t + 0.9375; }
        t -= 2.625 / d1;
        return n1 * t * t + 0.984375;
    },
    easeOutElastic: (t) => {
        const c4 = (2 * Math.PI) / 3;
        return t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
    }
};

class TweenManager {
    constructor() {
        this.tweens = [];
    }

    add(obj, props, duration, easing = Easing.linear, onComplete = null) {
        const startProps = {};
        for (const key in props) startProps[key] = obj[key];
        this.tweens.push({ obj, startProps, targetProps: props, duration, time: 0, easing, onComplete });
    }

    update(dt) {
        for (let i = this.tweens.length - 1; i >= 0; i--) {
            const tween = this.tweens[i];
            tween.time += dt;
            const progress = Math.min(tween.time / tween.duration, 1);
            const eased = tween.easing(progress);
            for (const key in tween.targetProps) {
                tween.obj[key] = tween.startProps[key] + (tween.targetProps[key] - tween.startProps[key]) * eased;
            }
            if (progress === 1) {
                if (tween.onComplete) tween.onComplete();
                this.tweens.splice(i, 1);
            }
        }
    }
}

class VisualEngine {
    constructor() {
        this.container = document.getElementById('game-container');
        this.canvas = document.getElementById('webgl-canvas');
        this.textContainer = document.getElementById('floating-text-container');

        const w = Math.max(300, this.container.clientWidth);
        const h = Math.max(300, this.container.clientHeight);

        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000000);
        this.camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 1000);
        this.cameraTarget = new THREE.Vector3();

        this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: true });
        this.renderer.setSize(w, h);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        this.composer = new EffectComposer(this.renderer);
        this.composer.addPass(new RenderPass(this.scene, this.camera));
        this.glitchPass = new GlitchPass();
        this.glitchPass.goWild = false;
        this.glitchPass.enabled = false;
        this.composer.addPass(this.glitchPass);
        this.composer.addPass(new OutputPass());

        this.tweens = new TweenManager();
        this.clock = new THREE.Clock();
        this.entities = [];
        this.particles = [];
        this.floatingTexts = [];
        this.trauma = 0;
        this.motionTime = 0;
        this.occluders = [];
        this.occluderLookup = new Map();
        this.raycaster = new THREE.Raycaster();

        this.materials = {
            floor: new THREE.MeshBasicMaterial({ color: 0x1e293b }),
            wallBox: new THREE.MeshBasicMaterial({ color: 0x020617 }),
            wallEdge: new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }),
            playerMain: new THREE.MeshBasicMaterial({ color: 0x22d3ee }),
            playerAccent: new THREE.MeshBasicMaterial({ color: 0x93c5fd }),
            playerCabin: new THREE.MeshBasicMaterial({ color: 0xe0f2fe }),
            playerShadow: new THREE.MeshBasicMaterial({ color: 0x0f172a }),
            chest: new THREE.MeshBasicMaterial({ color: 0xfacc15 }),
            chestDark: new THREE.MeshBasicMaterial({ color: 0x854d0e }),
            end: new THREE.MeshBasicMaterial({ color: 0x10b981 })
        };

        this.setupPlayer();
        window.addEventListener('resize', () => this.resize());
        this.resize();
        this.animate = this.animate.bind(this);
        this.animate();
    }

    resize() {
        const w = Math.max(300, this.container.clientWidth);
        const h = Math.max(300, this.container.clientHeight);
        this.camera.aspect = w / h;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(w, h);
        this.composer.setSize(w, h);
    }

    createOutlinedAssembly(geometry, material, edgeColor = 0x020617) {
        const group = new THREE.Group();
        const mesh = new THREE.Mesh(geometry, material);
        const edges = new THREE.LineSegments(
            new THREE.EdgesGeometry(geometry),
            new THREE.LineBasicMaterial({ color: edgeColor, linewidth: 2 })
        );
        group.add(mesh);
        group.add(edges);
        group.userData.mesh = mesh;
        return group;
    }

    sampleIndices(count, maxVisible) {
        if (count <= maxVisible) return Array.from({ length: count }, (_, index) => index);
        const result = [];
        for (let i = 0; i < maxVisible; i++) {
            const index = Math.floor(i * count / maxVisible);
            if (!result.includes(index)) result.push(index);
        }
        return result;
    }

    createLineLoop(points, color, opacity = 1) {
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        return new THREE.LineLoop(geometry, new THREE.LineBasicMaterial({ color, transparent: opacity < 1, opacity }));
    }

    createLinePath(points, color, opacity = 1) {
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        return new THREE.Line(geometry, new THREE.LineBasicMaterial({ color, transparent: opacity < 1, opacity }));
    }

    createSparseCylinderLines(radiusTop, radiusBottom, height, radialSegments, color) {
        if (radialSegments <= 14) {
            return new THREE.LineSegments(
                new THREE.EdgesGeometry(new THREE.CylinderGeometry(radiusTop, radiusBottom, height, radialSegments)),
                new THREE.LineBasicMaterial({ color })
            );
        }

        const group = new THREE.Group();
        const rimSamples = this.sampleIndices(radialSegments, 16);
        const verticalSamples = this.sampleIndices(radialSegments, 8);
        const halfHeight = height / 2;

        const makeCircle = (radius, y) => rimSamples.map((index) => {
            const angle = index / radialSegments * Math.PI * 2;
            return new THREE.Vector3(Math.cos(angle) * radius, y, Math.sin(angle) * radius);
        });

        group.add(this.createLineLoop(makeCircle(radiusTop, halfHeight), color));
        group.add(this.createLineLoop(makeCircle(radiusBottom, -halfHeight), color));

        if (Math.abs(radiusTop - radiusBottom) > 0.02) {
            const midRadius = (radiusTop + radiusBottom) * 0.5;
            group.add(this.createLineLoop(makeCircle(midRadius, 0), color, 0.85));
        }

        for (const index of verticalSamples) {
            const angle = index / radialSegments * Math.PI * 2;
            const top = new THREE.Vector3(Math.cos(angle) * radiusTop, halfHeight, Math.sin(angle) * radiusTop);
            const bottom = new THREE.Vector3(Math.cos(angle) * radiusBottom, -halfHeight, Math.sin(angle) * radiusBottom);
            group.add(this.createLinePath([top, bottom], color, 0.9));
        }

        return group;
    }

    createSparseSphereDomeLines(radius, widthSegments, heightSegments, color) {
        if (widthSegments <= 14) {
            return new THREE.LineSegments(
                new THREE.EdgesGeometry(new THREE.SphereGeometry(radius, widthSegments, heightSegments, 0, Math.PI * 2, 0, Math.PI / 2)),
                new THREE.LineBasicMaterial({ color })
            );
        }

        const group = new THREE.Group();
        const latitudes = this.sampleIndices(heightSegments, 5).filter((index) => index > 0);
        const longitudes = this.sampleIndices(widthSegments, 8);

        for (const latIndex of latitudes) {
            const theta = latIndex / heightSegments * (Math.PI / 2);
            const y = Math.cos(theta) * radius;
            const ringRadius = Math.sin(theta) * radius;
            const ringPoints = [];
            const segments = widthSegments <= 18 ? widthSegments : 18;
            for (let i = 0; i < segments; i++) {
                const phi = i / segments * Math.PI * 2;
                ringPoints.push(new THREE.Vector3(Math.cos(phi) * ringRadius, y, Math.sin(phi) * ringRadius));
            }
            group.add(this.createLineLoop(ringPoints, color, 0.9));
        }

        for (const lonIndex of longitudes) {
            const phi = lonIndex / widthSegments * Math.PI * 2;
            const points = [];
            const segments = heightSegments <= 10 ? heightSegments : 8;
            for (let i = 0; i <= segments; i++) {
                const theta = i / segments * (Math.PI / 2);
                points.push(new THREE.Vector3(
                    Math.cos(phi) * Math.sin(theta) * radius,
                    Math.cos(theta) * radius,
                    Math.sin(phi) * Math.sin(theta) * radius
                ));
            }
            group.add(this.createLinePath(points, color, 0.85));
        }

        return group;
    }

    createSparseTorusLines(radius, tube, radialSegments, tubularSegments, color) {
        if (Math.max(radialSegments, tubularSegments) <= 16) {
            return new THREE.LineSegments(
                new THREE.EdgesGeometry(new THREE.TorusGeometry(radius, tube, radialSegments, tubularSegments)),
                new THREE.LineBasicMaterial({ color })
            );
        }

        const group = new THREE.Group();
        const radialIndices = this.sampleIndices(radialSegments, radialSegments > 18 ? 6 : radialSegments);
        const tubularIndices = this.sampleIndices(tubularSegments, tubularSegments > 20 ? 10 : tubularSegments);

        for (const radialIndex of radialIndices) {
            const v = radialIndex / radialSegments * Math.PI * 2;
            const points = [];
            for (let i = 0; i < tubularSegments; i++) {
                const u = i / tubularSegments * Math.PI * 2;
                points.push(new THREE.Vector3(
                    (radius + tube * Math.cos(v)) * Math.cos(u),
                    tube * Math.sin(v),
                    (radius + tube * Math.cos(v)) * Math.sin(u)
                ));
            }
            group.add(this.createLineLoop(points, color, 0.82));
        }

        for (const tubularIndex of tubularIndices) {
            const u = tubularIndex / tubularSegments * Math.PI * 2;
            const points = [];
            for (let i = 0; i < radialSegments; i++) {
                const v = i / radialSegments * Math.PI * 2;
                points.push(new THREE.Vector3(
                    (radius + tube * Math.cos(v)) * Math.cos(u),
                    tube * Math.sin(v),
                    (radius + tube * Math.cos(v)) * Math.sin(u)
                ));
            }
            group.add(this.createLineLoop(points, color, 0.9));
        }

        return group;
    }

    createAssemblyWithCustomLines(geometry, material, lines) {
        const group = new THREE.Group();
        const mesh = new THREE.Mesh(geometry, material);
        group.add(mesh);
        group.add(lines);
        group.userData.mesh = mesh;
        return group;
    }

    createWallMaterial() {
        const material = this.materials.wallBox.clone();
        material.transparent = true;
        material.onBeforeCompile = (shader) => {
            shader.uniforms.uRevealCenter = { value: new THREE.Vector3() };
            shader.uniforms.uRevealRadius = { value: 0.82 };
            shader.uniforms.uRevealOpacity = { value: 0.2 };
            shader.uniforms.uRevealEnabled = { value: 0 };

            shader.vertexShader = shader.vertexShader.replace(
                '#include <common>',
                '#include <common>\nvarying vec3 vWorldPos;'
            ).replace(
                '#include <begin_vertex>',
                '#include <begin_vertex>\nvec4 jkpWorldPos = modelMatrix * vec4( transformed, 1.0 );\nvWorldPos = jkpWorldPos.xyz;'
            );

            shader.fragmentShader = shader.fragmentShader.replace(
                '#include <common>',
                '#include <common>\nvarying vec3 vWorldPos;\nuniform vec3 uRevealCenter;\nuniform float uRevealRadius;\nuniform float uRevealOpacity;\nuniform float uRevealEnabled;'
            ).replace(
                'vec4 diffuseColor = vec4( diffuse, opacity );',
                'vec4 diffuseColor = vec4( diffuse, opacity );\nfloat revealDist = distance(vWorldPos, uRevealCenter);\nfloat revealMask = 1.0 - smoothstep(uRevealRadius * 0.45, uRevealRadius, revealDist);\ndiffuseColor.a = mix(diffuseColor.a, uRevealOpacity, revealMask * uRevealEnabled);'
            );

            material.userData.shader = shader;
        };
        return material;
    }

    createWallCell(wallGeo, edgesGeo, pos) {
        const group = new THREE.Group();
        const boxMaterial = this.createWallMaterial();
        const boxMesh = new THREE.Mesh(wallGeo, boxMaterial);
        const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2, transparent: true, opacity: 1 });
        const edgeMesh = new THREE.LineSegments(edgesGeo, edgeMaterial);
        group.add(boxMesh);
        group.add(edgeMesh);
        group.position.set(pos.x, 0.25, pos.z);

        const occluder = {
            group,
            boxMesh,
            edgeMesh,
            baseEdgeOpacity: 1
        };
        this.occluders.push(occluder);
        this.occluderLookup.set(boxMesh.uuid, occluder);
        return group;
    }

    updateOccluders() {
        for (const occluder of this.occluders) {
            const shader = occluder.boxMesh.material.userData.shader;
            if (shader) shader.uniforms.uRevealEnabled.value = 0;
            occluder.edgeMesh.material.opacity = occluder.baseEdgeOpacity;
        }

        if (!this.playerObj?.visible) return;

        const playerPos = this.playerObj.position.clone();
        const dir = playerPos.clone().sub(this.camera.position);
        const distance = dir.length();
        if (distance <= 0.01) return;

        this.raycaster.set(this.camera.position, dir.normalize());
        this.raycaster.far = distance;
        const hits = this.raycaster.intersectObjects(this.occluders.map((item) => item.boxMesh), false);

        for (const hit of hits) {
            const occluder = this.occluderLookup.get(hit.object.uuid);
            if (!occluder) continue;
            const shader = occluder.boxMesh.material.userData.shader;
            if (shader) {
                shader.uniforms.uRevealEnabled.value = 1;
                shader.uniforms.uRevealCenter.value.copy(playerPos);
            }
            occluder.edgeMesh.material.opacity = 0.25;
        }
    }

    setupPlayer() {
        this.playerObj = new THREE.Group();
        this.playerBody = new THREE.Group();
        this.playerMesh = this.playerBody;

        this.playerTopRotor = new THREE.Group();
        this.playerBottomRotor = new THREE.Group();
        this.playerTopRotor.position.y = 0.12;
        this.playerBottomRotor.position.y = -0.1;

        const topDisk = this.createOutlinedAssembly(
            new THREE.CylinderGeometry(0.2, 0.55, 0.12, 32),
            this.materials.playerMain,
            0x0f172a
        );
        const bottomDisk = this.createOutlinedAssembly(
            new THREE.CylinderGeometry(0.55, 0.18, 0.12, 32),
            this.materials.playerShadow,
            0x020617
        );
        const upperRing = this.createOutlinedAssembly(
            new THREE.TorusGeometry(0.4, 0.055, 12, 32),
            this.materials.playerAccent,
            0x0f172a
        );
        upperRing.rotation.x = Math.PI / 2;
        const lowerRing = this.createOutlinedAssembly(
            new THREE.TorusGeometry(0.34, 0.045, 10, 28),
            this.materials.playerMain,
            0x0f172a
        );
        lowerRing.rotation.x = Math.PI / 2;

        const cabin = this.createOutlinedAssembly(
            new THREE.SphereGeometry(0.2, 20, 16, 0, Math.PI * 2, 0, Math.PI / 2),
            this.materials.playerCabin,
            0x38bdf8
        );
        cabin.position.y = 0.19;

        const engineFinGeo = new THREE.BoxGeometry(0.08, 0.04, 0.28);
        for (let i = 0; i < 4; i++) {
            const fin = this.createOutlinedAssembly(engineFinGeo, this.materials.playerAccent, 0x082f49);
            fin.position.set(Math.cos(i * Math.PI / 2) * 0.32, 0.01, Math.sin(i * Math.PI / 2) * 0.32);
            fin.rotation.y = i * Math.PI / 2;
            this.playerTopRotor.add(fin);
        }

        const glowNodesGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.08, 12);
        for (let i = 0; i < 3; i++) {
            const node = this.createOutlinedAssembly(glowNodesGeo, this.materials.playerCabin, 0x0f172a);
            node.position.set(Math.cos(i * (Math.PI * 2 / 3)) * 0.22, -0.06, Math.sin(i * (Math.PI * 2 / 3)) * 0.22);
            node.rotation.z = Math.PI / 2;
            this.playerBottomRotor.add(node);
        }

        this.playerTopRotor.add(topDisk, upperRing);
        this.playerBottomRotor.add(bottomDisk, lowerRing);
        this.playerBody.add(this.playerTopRotor, this.playerBottomRotor, cabin);
        this.playerObj.add(this.playerBody);
        this.scene.add(this.playerObj);
    }

    buildEnemyModel(archetype) {
        const group = new THREE.Group();
        const baseMat = new THREE.MeshBasicMaterial({ color: archetype.color });
        const accentMat = new THREE.MeshBasicMaterial({ color: archetype.accent });
        let spinGroup = null;
        let counterSpinGroup = null;

        if (archetype.id === 'scout') {
            const core = this.createOutlinedAssembly(new THREE.OctahedronGeometry(0.24), baseMat, 0x431407);
            const ring = this.createOutlinedAssembly(new THREE.TorusGeometry(0.34, 0.03, 10, 28), accentMat, 0x7c2d12);
            ring.rotation.x = Math.PI / 2;
            spinGroup = new THREE.Group();
            spinGroup.add(ring);
            group.add(core, spinGroup);
        } else if (archetype.id === 'brute') {
            const body = this.createOutlinedAssembly(new THREE.CylinderGeometry(0.28, 0.4, 0.48, 20), baseMat, 0x450a0a);
            const cap = this.createOutlinedAssembly(new THREE.ConeGeometry(0.18, 0.22, 5), accentMat, 0x450a0a);
            cap.position.y = 0.34;
            group.add(body, cap);
            for (let i = 0; i < 4; i++) {
                const spike = this.createOutlinedAssembly(new THREE.ConeGeometry(0.07, 0.2, 4), accentMat, 0x450a0a);
                spike.position.set(Math.cos(i * Math.PI / 2) * 0.3, 0.08, Math.sin(i * Math.PI / 2) * 0.3);
                spike.rotation.z = Math.PI / 2;
                spike.rotation.y = i * Math.PI / 2;
                group.add(spike);
            }
        } else if (archetype.id === 'spine') {
            const spine = this.createOutlinedAssembly(new THREE.ConeGeometry(0.26, 0.6, 6), baseMat, 0x3b0764);
            spine.position.y = 0.1;
            const ring = this.createOutlinedAssembly(new THREE.TorusGeometry(0.26, 0.028, 8, 24), accentMat, 0x581c87);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = -0.02;
            spinGroup = new THREE.Group();
            spinGroup.add(ring);
            group.add(spine, spinGroup);
        } else if (archetype.id === 'warden') {
            const hub = this.createOutlinedAssembly(new THREE.IcosahedronGeometry(0.22, 0), baseMat, 0x042f2e);
            const halo = this.createOutlinedAssembly(new THREE.TorusGeometry(0.38, 0.04, 10, 30), accentMat, 0x134e4a);
            halo.rotation.x = Math.PI / 2;
            spinGroup = new THREE.Group();
            counterSpinGroup = new THREE.Group();
            spinGroup.add(halo);
            const verticalHalo = this.createOutlinedAssembly(new THREE.TorusGeometry(0.28, 0.03, 10, 24), accentMat, 0x134e4a);
            verticalHalo.rotation.y = Math.PI / 2;
            counterSpinGroup.add(verticalHalo);
            group.add(hub, spinGroup, counterSpinGroup);
        } else if (archetype.id === 'boss') {
            const core = this.createOutlinedAssembly(new THREE.DodecahedronGeometry(0.35, 0), baseMat, 0x78350f);
            const outerRing = this.createOutlinedAssembly(new THREE.TorusGeometry(0.58, 0.055, 12, 40), accentMat, 0x92400e);
            outerRing.rotation.x = Math.PI / 2;
            const innerRing = this.createOutlinedAssembly(new THREE.TorusGeometry(0.4, 0.035, 10, 32), baseMat, 0x92400e);
            innerRing.rotation.y = Math.PI / 2;
            spinGroup = new THREE.Group();
            counterSpinGroup = new THREE.Group();
            spinGroup.add(outerRing);
            counterSpinGroup.add(innerRing);
            group.add(core, spinGroup, counterSpinGroup);
            for (let i = 0; i < 6; i++) {
                const shard = this.createOutlinedAssembly(new THREE.BoxGeometry(0.1, 0.22, 0.1), accentMat, 0x78350f);
                shard.position.set(Math.cos(i * Math.PI / 3) * 0.55, Math.sin(i * Math.PI / 3) * 0.12, Math.sin(i * Math.PI / 3) * 0.55);
                group.add(shard);
            }
        }

        group.scale.setScalar(archetype.scale || 1);
        return { group, spinGroup, counterSpinGroup };
    }

    buildChestModel() {
        const group = new THREE.Group();
        const base = this.createOutlinedAssembly(new THREE.BoxGeometry(0.44, 0.24, 0.44), this.materials.chestDark, 0x451a03);
        const lid = this.createOutlinedAssembly(new THREE.BoxGeometry(0.48, 0.14, 0.48), this.materials.chest, 0x78350f);
        lid.position.y = 0.16;
        const clasp = this.createOutlinedAssembly(new THREE.BoxGeometry(0.08, 0.12, 0.08), this.materials.playerCabin, 0x451a03);
        clasp.position.set(0, 0.05, 0.24);
        group.add(base, lid, clasp);
        return { group };
    }

    shake(amount) {
        this.trauma = Math.min(this.trauma + amount, 1.0);
    }

    glitch(duration = 150) {
        this.glitchPass.enabled = true;
        setTimeout(() => { this.glitchPass.enabled = false; }, duration);
    }

    triggerUpgradeEffect() {
        this.shake(0.2);
        this.playerMesh.scale.set(1, 1, 1);
        this.tweens.add(this.playerMesh.scale, { x: 1.8, y: 1.8, z: 1.8 }, 0.2, Easing.easeOutQuad, () => {
            this.tweens.add(this.playerMesh.scale, { x: 1, y: 1, z: 1 }, 0.6, Easing.easeOutElastic);
        });
        this.spawnBurst(this.playerObj.position, 0x4ade80, 25, 4);
    }

    spawnBurst(pos, colorHex, count = 15, speedMultiplier = 1) {
        const geo = new THREE.PlaneGeometry(0.15, 0.15);
        const mat = new THREE.MeshBasicMaterial({ color: colorHex, side: THREE.DoubleSide });
        for (let i = 0; i < count; i++) {
            const particle = new THREE.Mesh(geo, mat);
            particle.position.copy(pos);
            particle.position.y += 0.2;
            const angle = Math.random() * Math.PI * 2;
            const speed = (Math.random() * 3 + 2) * speedMultiplier;
            particle.userData.velocity = new THREE.Vector3(Math.cos(angle) * speed, Math.random() * 5 + 2, Math.sin(angle) * speed);
            particle.userData.life = 1.0;
            this.scene.add(particle);
            this.particles.push(particle);
        }
    }

    addFloatingText(text, pos3D, colorStr, isCritical = false) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = text;
        el.style.color = colorStr;
        if (isCritical) el.style.fontSize = '24px';
        this.textContainer.appendChild(el);
        this.floatingTexts.push({ el, pos: pos3D.clone().add(new THREE.Vector3(0, 1.5, 0)), life: 1.0, vy: 2.0 });
    }

    updateParticlesAndText(dt) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const particle = this.particles[i];
            particle.userData.life -= dt * 1.5;
            if (particle.userData.life <= 0) {
                this.scene.remove(particle);
                this.particles.splice(i, 1);
                continue;
            }
            particle.userData.velocity.y -= 15 * dt;
            particle.position.addScaledVector(particle.userData.velocity, dt);
            particle.scale.setScalar(particle.userData.life);
            particle.quaternion.copy(this.camera.quaternion);
        }

        for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
            const text = this.floatingTexts[i];
            text.life -= dt * 1.2;
            if (text.life <= 0) {
                text.el.remove();
                this.floatingTexts.splice(i, 1);
                continue;
            }
            text.pos.y += text.vy * dt;
            const temp = text.pos.clone();
            temp.project(this.camera);
            const x = (temp.x * 0.5 + 0.5) * this.canvas.clientWidth;
            const y = (temp.y * -0.5 + 0.5) * this.canvas.clientHeight;
            text.el.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) scale(${text.life < 0.2 ? text.life * 5 : 1})`;
            text.el.style.opacity = text.life;
        }
    }

    updateEntityMotion(dt) {
        this.motionTime += dt;
        this.playerTopRotor.rotation.y += dt * 8.5;
        this.playerBottomRotor.rotation.y -= dt * 11.5;
        this.playerBody.position.y = Math.sin(this.motionTime * 3.4) * 0.03;

        for (const entity of this.entities) {
            if (!entity.mesh || entity.type === 'end') continue;
            const yTarget = entity.baseY + Math.sin(this.motionTime * entity.hoverSpeed + entity.hoverOffset) * entity.hoverAmplitude;
            entity.mesh.position.y = THREE.MathUtils.lerp(entity.mesh.position.y, yTarget, dt * 5);
            if (entity.spinGroup) entity.spinGroup.rotation.y += dt * entity.spinSpeed;
            if (entity.counterSpinGroup) entity.counterSpinGroup.rotation.y -= dt * entity.counterSpinSpeed;
        }
    }

    animate() {
        requestAnimationFrame(this.animate);
        const dt = Math.min(this.clock.getDelta(), 0.1);
        this.tweens.update(dt);
        this.updateParticlesAndText(dt);
        this.updateEntityMotion(dt);

        if (this.playerObj) {
            const desiredCamPos = new THREE.Vector3();
            const desiredTarget = new THREE.Vector3();
            if (GameState.phase === 'COMBAT') {
                const pPos = this.playerObj.position;
                const currentEnemy = window.gameController?.currentEnemy;
                const enemyPos = currentEnemy ? currentEnemy.mesh.position : pPos.clone();
                const bossZoomOut = currentEnemy?.enemyData?.boss ? 1.4 : 1;
                desiredCamPos.set(pPos.x, 3.4 * bossZoomOut, pPos.z + 4.1 * bossZoomOut);
                desiredTarget.lerpVectors(pPos, enemyPos, 0.5);
                this.camera.fov = THREE.MathUtils.lerp(this.camera.fov, currentEnemy?.enemyData?.boss ? 48 : 45, dt * 5);
            } else if (GameState.phase === 'GENERATING') {
                desiredCamPos.set(0, 18, 4);
                desiredTarget.set(0, 0, 0);
                this.camera.fov = THREE.MathUtils.lerp(this.camera.fov, 55, dt * 2);
            } else {
                const pPos = this.playerObj.position;
                desiredCamPos.set(pPos.x, 9, pPos.z + 4);
                desiredTarget.copy(pPos);
                this.camera.fov = THREE.MathUtils.lerp(this.camera.fov, 50, dt * 3);
            }

            this.camera.updateProjectionMatrix();
            this.camera.position.lerp(desiredCamPos, dt * 4);
            this.cameraTarget.lerp(desiredTarget, dt * 6);
            this.camera.lookAt(this.cameraTarget);

            if (this.trauma > 0) {
                const shakeAmt = this.trauma * this.trauma;
                this.camera.position.x += (Math.random() - 0.5) * shakeAmt;
                this.camera.position.y += (Math.random() - 0.5) * shakeAmt;
                this.camera.position.z += (Math.random() - 0.5) * shakeAmt;
                this.trauma = Math.max(0, this.trauma - dt * 2.5);
            }
        }

        this.updateOccluders();
        this.composer.render();
    }
}

class GameController {
    constructor(engine) {
        this.engine = engine;
        this.mazeGroup = new THREE.Group();
        this.engine.scene.add(this.mazeGroup);
        this.cols = 15;
        this.rows = 15;
        this.offsetC = -Math.floor(this.cols / 2);
        this.offsetR = -Math.floor(this.rows / 2);
        this.playerPos = { c: 0, r: 0 };
        this.endPos = { c: 0, r: 0 };
        this.path = [];
        this.genStack = [];
        this.currentEnemy = null;
        this.combatUiHideTimer = null;

        ['speed', 'atk', 'hp', 'chest', 'monster'].forEach((type) => {
            document.getElementById(`btn-up-${type}`).addEventListener('click', async () => {
                await window.soundEngine?.unlock();
                GameState.tryBuy(type);
            });
        });

        window.gameController = this;
        this.startLevel();
    }

    sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
    }

    showCombatUI() {
        const ui = document.getElementById('rpg-combat-ui');
        if (this.combatUiHideTimer) {
            clearTimeout(this.combatUiHideTimer);
            this.combatUiHideTimer = null;
        }
        ui.classList.remove('hidden');
        void ui.offsetWidth;
        ui.classList.remove('opacity-0');
        return ui;
    }

    hideCombatUI() {
        const ui = document.getElementById('rpg-combat-ui');
        if (this.combatUiHideTimer) {
            clearTimeout(this.combatUiHideTimer);
        }
        ui.classList.add('opacity-0');
        this.combatUiHideTimer = setTimeout(() => {
            ui.classList.add('hidden');
            this.combatUiHideTimer = null;
        }, 300);
        return ui;
    }

    getWorldPos(c, r) {
        return new THREE.Vector3(c + this.offsetC, 0, r + this.offsetR);
    }

    startLevel() {
        GameState.phase = 'GENERATING';
        GameState.player.currentHp = GameState.player.baseHp;
        GameState.updateUI();

        while (this.mazeGroup.children.length > 0) this.mazeGroup.remove(this.mazeGroup.children[0]);
        this.engine.entities.forEach((entity) => this.engine.scene.remove(entity.mesh));
        this.engine.entities = [];
        this.engine.occluders = [];
        this.engine.occluderLookup.clear();
        this.grid = [];

        const floorGeo = new THREE.PlaneGeometry(this.cols + 2, this.rows + 2);
        const floorMesh = new THREE.Mesh(floorGeo, this.engine.materials.floor);
        floorMesh.rotation.x = -Math.PI / 2;
        floorMesh.position.y = 0;
        this.mazeGroup.add(floorMesh);

        const wallGeo = new THREE.BoxGeometry(1, 0.5, 1);
        const edgesGeo = new THREE.EdgesGeometry(wallGeo);
        for (let r = 0; r < this.rows; r++) {
            const row = [];
            for (let c = 0; c < this.cols; c++) {
                const pos = this.getWorldPos(c, r);
                const group = this.engine.createWallCell(wallGeo, edgesGeo, pos);
                this.mazeGroup.add(group);
                row.push({ c, r, isWall: true, mesh: group, visited: false, entity: null });
            }
            this.grid.push(row);
        }

        this.playerPos = { c: 1, r: 1 };
        this.endPos = { c: this.cols - 2, r: this.rows - 2 };
        this.grid[1][1].visited = true;
        this.genStack = [this.grid[1][1]];
        this.engine.playerObj.visible = false;
        this.genInterval = setInterval(() => this.stepGenerate(), 20);
    }

    digWall(cell) {
        if (!cell.isWall) return;
        cell.isWall = false;
        this.engine.tweens.add(cell.mesh.position, { y: -0.5 }, 0.3, Easing.easeOutQuad);
        if (Math.random() > 0.5) {
            this.engine.spawnBurst(new THREE.Vector3(cell.mesh.position.x, 0, cell.mesh.position.z), 0x475569, 3, 0.5);
        }
    }

    stepGenerate() {
        if (this.genStack.length === 0) {
            clearInterval(this.genInterval);
            this.finishGeneration();
            return;
        }

        let steps = 3;
        while (steps-- > 0 && this.genStack.length > 0) {
            const curr = this.genStack[this.genStack.length - 1];
            this.digWall(curr);
            const neighbors = [];
            const dirs = [[-2, 0], [2, 0], [0, -2], [0, 2]];

            for (const dir of dirs) {
                const nc = curr.c + dir[0];
                const nr = curr.r + dir[1];
                if (nc > 0 && nc < this.cols - 1 && nr > 0 && nr < this.rows - 1 && !this.grid[nr][nc].visited) {
                    neighbors.push({ c: nc, r: nr, wc: curr.c + dir[0] / 2, wr: curr.r + dir[1] / 2 });
                }
            }

            if (neighbors.length > 0) {
                const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                this.digWall(this.grid[next.wr][next.wc]);
                this.grid[next.r][next.c].visited = true;
                this.genStack.push(this.grid[next.r][next.c]);
            } else {
                this.genStack.pop();
            }
        }
    }

    pickEnemyArchetype() {
        const pool = ENEMY_ARCHETYPES.filter((enemy) => !enemy.boss && GameState.level >= enemy.minLevel);
        const totalWeight = pool.reduce((sum, enemy) => sum + enemy.weight, 0);
        let roll = Math.random() * totalWeight;
        for (const enemy of pool) {
            roll -= enemy.weight;
            if (roll <= 0) return enemy;
        }
        return pool[pool.length - 1];
    }

    createChestEntity(c, r) {
        const built = this.engine.buildChestModel();
        const pos = this.getWorldPos(c, r);
        built.group.position.set(pos.x, 5, pos.z);
        this.engine.scene.add(built.group);
        this.engine.tweens.add(built.group.position, { y: 0.25 }, 0.6, Easing.easeOutBounce);
        return {
            type: 'chest',
            mesh: built.group,
            c,
            r,
            baseY: 0.25,
            hoverAmplitude: 0.04,
            hoverSpeed: 1.5,
            hoverOffset: Math.random() * Math.PI * 2,
            spinSpeed: 0.7,
            counterSpinSpeed: 0,
            spinGroup: built.group,
            counterSpinGroup: null
        };
    }

    createMonsterEntity(archetype, c, r) {
        const built = this.engine.buildEnemyModel(archetype);
        const pos = this.getWorldPos(c, r);
        built.group.position.set(pos.x, 5, pos.z);
        this.engine.scene.add(built.group);
        this.engine.tweens.add(built.group.position, { y: 0.25 }, 0.6, Easing.easeOutBounce);
        return {
            type: 'monster',
            mesh: built.group,
            c,
            r,
            enemyData: archetype,
            baseY: 0.25,
            hoverAmplitude: archetype.hoverAmplitude,
            hoverSpeed: archetype.hoverSpeed,
            hoverOffset: Math.random() * Math.PI * 2,
            spinSpeed: archetype.boss ? 1.9 : 2.6,
            counterSpinSpeed: archetype.boss ? 2.7 : 3.6,
            spinGroup: built.spinGroup,
            counterSpinGroup: built.counterSpinGroup
        };
    }

    finishGeneration() {
        this.digWall(this.grid[this.endPos.r][this.endPos.c]);
        const openCells = [];

        for (let r = 1; r < this.rows - 1; r++) {
            for (let c = 1; c < this.cols - 1; c++) {
                if ((r === 1 && c === 1) || (r === this.endPos.r && c === this.endPos.c) || this.grid[r][c].isWall) continue;
                openCells.push(this.grid[r][c]);
                const rand = Math.random();
                if (rand < GameState.maze.baseMonsterRate) {
                    const monster = this.createMonsterEntity(this.pickEnemyArchetype(), c, r);
                    this.engine.entities.push(monster);
                    this.grid[r][c].entity = 'monster';
                } else if (rand < GameState.maze.baseMonsterRate + GameState.maze.baseChestRate) {
                    const chest = this.createChestEntity(c, r);
                    this.engine.entities.push(chest);
                    this.grid[r][c].entity = 'chest';
                }
            }
        }

        if (GameState.level >= 4 && GameState.isBossUnlocked() && Math.random() < GameState.getBossFloorChance()) {
            const bossCandidates = openCells.filter((cell) => cell.entity === null);
            if (bossCandidates.length > 0) {
                const bossCell = bossCandidates[Math.floor(Math.random() * bossCandidates.length)];
                const boss = this.createMonsterEntity(ENEMY_ARCHETYPES.find((enemy) => enemy.id === 'boss'), bossCell.c, bossCell.r);
                this.engine.entities.push(boss);
                bossCell.entity = 'monster';
            }
        }

        const endMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.1, 16), this.engine.materials.end);
        const endWp = this.getWorldPos(this.endPos.c, this.endPos.r);
        endMesh.position.set(endWp.x, 0.06, endWp.z);
        this.engine.scene.add(endMesh);
        this.engine.entities.push({ type: 'end', mesh: endMesh, c: this.endPos.c, r: this.endPos.r, baseY: 0.06, hoverAmplitude: 0, hoverSpeed: 0, hoverOffset: 0 });
        this.grid[this.endPos.r][this.endPos.c].entity = 'end';

        this.findPath();
        const pStart = this.getWorldPos(1, 1);
        this.engine.playerObj.position.set(pStart.x, 5, pStart.z);
        this.engine.playerObj.visible = true;
        this.engine.tweens.add(this.engine.playerObj.position, { y: 0.1 }, 0.6, Easing.easeOutBounce, () => {
            GameState.phase = 'EXPLORING';
            GameState.updateUI();
            this.exploreNext();
        });
    }

    findPath() {
        const queue = [{ c: this.playerPos.c, r: this.playerPos.r, path: [] }];
        const visited = new Set([`${this.playerPos.c},${this.playerPos.r}`]);
        const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
        while (queue.length > 0) {
            const curr = queue.shift();
            if (curr.c === this.endPos.c && curr.r === this.endPos.r) {
                this.path = curr.path;
                return;
            }
            for (const dir of dirs) {
                const nc = curr.c + dir[0];
                const nr = curr.r + dir[1];
                if (nc > 0 && nc < this.cols && nr > 0 && nr < this.rows && !this.grid[nr][nc].isWall) {
                    const key = `${nc},${nr}`;
                    if (!visited.has(key)) {
                        visited.add(key);
                        queue.push({ c: nc, r: nr, path: [...curr.path, { c: nc, r: nr }] });
                    }
                }
            }
        }
    }

    exploreNext() {
        if (GameState.phase !== 'EXPLORING' || this.path.length === 0) return;

        const nextNode = this.path[0];
        const nextCell = this.grid[nextNode.r][nextNode.c];

        if (nextCell.entity === 'monster') {
            const entityObj = this.engine.entities.find((entity) => entity.c === nextNode.c && entity.r === nextNode.r);
            if (entityObj) this.startCombatRPG(entityObj, nextNode);
            return;
        }

        this.path.shift();
        const targetPos = this.getWorldPos(nextNode.c, nextNode.r);
        this.engine.tweens.add(this.engine.playerObj.position, { x: targetPos.x, z: targetPos.z }, GameState.player.baseSpeed, Easing.linear, () => {
            this.playerPos.c = nextNode.c;
            this.playerPos.r = nextNode.r;
            this.checkInteraction();
        });
    }

    async checkInteraction() {
        const cell = this.grid[this.playerPos.r][this.playerPos.c];
        if (cell.entity) {
            const type = cell.entity;
            cell.entity = null;
            const entityIndex = this.engine.entities.findIndex((entity) => entity.c === this.playerPos.c && entity.r === this.playerPos.r);
            const entityObj = entityIndex > -1 ? this.engine.entities.splice(entityIndex, 1)[0] : null;

            if (type === 'chest') {
                const reward = 15 * GameState.level;
                GameState.addScore(reward);
                window.soundEngine?.chest();
                if (entityObj) {
                    this.engine.tweens.add(entityObj.mesh.scale, { x: 2, y: 2, z: 2 }, 0.2, Easing.easeOutQuad, () => {
                        this.engine.scene.remove(entityObj.mesh);
                    });
                    this.engine.spawnBurst(entityObj.mesh.position, 0xfacc15, 20, 1.5);
                    this.engine.addFloatingText(`+${reward}`, entityObj.mesh.position, '#facc15');
                }
                await this.sleep(100);
            } else if (type === 'end') {
                const reward = 100 * GameState.level;
                GameState.addScore(reward);
                GameState.level++;
                window.soundEngine?.levelClear();
                this.engine.addFloatingText('突破!', this.engine.playerObj.position, '#10b981', true);
                this.engine.triggerUpgradeEffect();
                setTimeout(() => this.startLevel(), 1200);
                return;
            }
        }
        if (GameState.phase === 'EXPLORING') this.exploreNext();
    }

    async typeText(text) {
        const el = document.getElementById('rpg-dialogue');
        el.innerText = '';
        for (let i = 0; i < text.length; i++) {
            el.innerText += text[i];
            await this.sleep(24);
        }
    }

    updateRPG_HP(enemyHp, enemyMaxHp, enemyObj) {
        const pPercent = Math.max(0, GameState.player.currentHp / GameState.player.baseHp * 100);
        document.getElementById('rpg-p-hp-bar').style.width = `${pPercent}%`;
        document.getElementById('rpg-p-hp-text').innerText = `${Math.floor(Math.max(0, GameState.player.currentHp))}/${GameState.player.baseHp}`;

        const mPercent = Math.max(0, enemyHp / enemyMaxHp * 100);
        const monsterName = document.getElementById('rpg-m-name');
        const monsterCard = document.getElementById('rpg-m-card');
        const monsterBar = document.getElementById('rpg-m-hp-bar');
        const monsterText = document.getElementById('rpg-m-hp-text');
        monsterName.innerText = enemyObj.enemyData.name;
        monsterBar.style.width = `${mPercent}%`;
        monsterText.innerText = `${Math.floor(Math.max(0, enemyHp))}/${Math.floor(enemyMaxHp)}`;

        if (enemyObj.enemyData.boss) {
            monsterCard.className = 'bg-amber-900/90 border-2 border-amber-400 p-2 md:p-3 rounded-lg w-32 md:w-56 shadow-[0_0_18px_rgba(251,191,36,0.55)] transform skew-x-6 backdrop-blur-sm';
            monsterName.className = 'text-amber-50 font-bold italic mb-1 text-xs md:text-sm tracking-widest text-right';
            monsterBar.className = 'bg-amber-400 h-full w-full hp-bar-fill origin-right';
            monsterText.className = 'text-left text-[10px] md:text-xs text-amber-100 mt-1 font-mono';
        } else {
            monsterCard.className = 'bg-red-900/90 border-2 border-red-500 p-2 md:p-3 rounded-lg w-32 md:w-56 shadow-[0_0_15px_rgba(248,113,113,0.4)] transform skew-x-6 backdrop-blur-sm';
            monsterName.className = 'text-red-100 font-bold italic mb-1 text-xs md:text-sm tracking-widest text-right';
            monsterBar.className = 'bg-red-500 h-full w-full hp-bar-fill origin-right';
            monsterText.className = 'text-left text-[10px] md:text-xs text-red-200 mt-1 font-mono';
        }
    }

    buildCombatProfile(enemyObj) {
        const data = enemyObj.enemyData;
        const linearScale = data.boss ? 1 + (GameState.level - 1) * 0.34 : 1 + (GameState.level - 1) * 0.18;
        const curveScale = Math.pow(data.boss ? 1.1 : 1.06, Math.max(0, GameState.level - 1));
        return {
            name: data.name,
            intro: data.intro,
            attackVerb: data.attackVerb,
            reward: Math.floor(data.reward * (1 + GameState.level * 0.18)),
            maxHp: Math.floor(data.baseHp * linearScale * curveScale),
            atk: Math.floor(data.baseAtk * linearScale),
            boss: !!data.boss,
            color: data.color
        };
    }

    async startCombatRPG(enemyObj, enemyNode) {
        GameState.phase = 'COMBAT';
        GameState.updateUI();
        this.currentEnemy = enemyObj;

        const profile = this.buildCombatProfile(enemyObj);
        let enemyHp = profile.maxHp;
        const enemyMesh = enemyObj.mesh;
        const playerMesh = this.engine.playerObj;
        enemyMesh.lookAt(playerMesh.position);
        playerMesh.lookAt(enemyMesh.position);

        this.showCombatUI();

        this.updateRPG_HP(enemyHp, profile.maxHp, enemyObj);

        await this.sleep(profile.boss ? 900 : 600);
        if (profile.boss) window.soundEngine?.bossIntro();
        await this.typeText(profile.intro);
        await this.sleep(profile.boss ? 900 : 700);

        const dir = new THREE.Vector3().subVectors(enemyMesh.position, playerMesh.position).normalize();
        const dashDist = profile.boss ? 0.82 : 0.65;

        while (enemyHp > 0 && GameState.player.currentHp > 0) {
            await this.typeText(`【玩家的回合】飞碟主炮锁定 ${profile.name}！`);
            await this.sleep(320);

            const damage = Math.floor(GameState.player.baseAtk * (0.84 + Math.random() * 0.42) * (profile.boss ? 0.92 : 1));
            const origPos = playerMesh.position.clone();
            const dashPos = origPos.clone().add(dir.clone().multiplyScalar(dashDist));

            this.engine.tweens.add(playerMesh.position, { x: dashPos.x, z: dashPos.z }, 0.1, Easing.easeOutQuad, () => {
                this.engine.shake(profile.boss ? 0.42 : 0.3);
                window.soundEngine?.enemyHit(profile.boss);
                this.engine.addFloatingText(damage.toString(), enemyMesh.position, '#38bdf8', true);
                this.engine.spawnBurst(enemyMesh.position, profile.color, profile.boss ? 18 : 12, profile.boss ? 2.1 : 1.5);
                this.engine.tweens.add(enemyMesh.scale, { x: 1.35, y: 0.55, z: 1.35 }, 0.1, Easing.linear, () => {
                    this.engine.tweens.add(enemyMesh.scale, { x: 1, y: 1, z: 1 }, 0.22, Easing.easeOutElastic);
                });
                this.engine.tweens.add(playerMesh.position, { x: origPos.x, z: origPos.z }, 0.2, Easing.easeOutQuad);
            });

            await this.sleep(300);
            enemyHp -= damage;
            this.updateRPG_HP(enemyHp, profile.maxHp, enemyObj);
            await this.typeText(`命中！${profile.name} 受到了 ${damage} 点伤害。`);
            await this.sleep(620);

            if (enemyHp <= 0) break;

            await this.typeText(`【${profile.name} 的回合】释放 ${profile.attackVerb}！`);
            await this.sleep(360);

            const enemyDamage = Math.floor(profile.atk * (0.82 + Math.random() * 0.38));
            const enemyOrigPos = enemyMesh.position.clone();
            const enemyDashPos = enemyOrigPos.clone().sub(dir.clone().multiplyScalar(dashDist));

            this.engine.tweens.add(enemyMesh.position, { x: enemyDashPos.x, z: enemyDashPos.z }, profile.boss ? 0.18 : 0.15, Easing.easeOutQuad, () => {
                this.engine.glitch(profile.boss ? 220 : 150);
                this.engine.shake(profile.boss ? 0.8 : 0.6);
                window.soundEngine?.playerHit(profile.boss);
                this.engine.addFloatingText(`-${enemyDamage}`, playerMesh.position, '#ef4444', true);
                this.engine.spawnBurst(playerMesh.position, 0xef4444, profile.boss ? 22 : 15, profile.boss ? 2.8 : 2);
                this.engine.tweens.add(this.engine.playerMesh.scale, { x: 1.24, y: 0.68, z: 1.24 }, 0.1, Easing.linear, () => {
                    this.engine.tweens.add(this.engine.playerMesh.scale, { x: 1, y: 1, z: 1 }, 0.22, Easing.easeOutElastic);
                });
                this.engine.tweens.add(enemyMesh.position, { x: enemyOrigPos.x, z: enemyOrigPos.z }, 0.24, Easing.easeOutQuad);
            });

            await this.sleep(320);
            GameState.player.currentHp -= enemyDamage;
            this.updateRPG_HP(enemyHp, profile.maxHp, enemyObj);
            await this.typeText(`警告！玩家损失了 ${enemyDamage} 点生命值！`);
            await this.sleep(700);
        }

        if (enemyHp <= 0) {
            GameState.addScore(profile.reward);
            window.soundEngine?.enemyDefeat(profile.boss);
            await this.typeText(`战斗胜利！击溃 ${profile.name}，获得了 ${profile.reward} 魂能！`);

            this.engine.shake(profile.boss ? 0.85 : 0.5);
            this.engine.spawnBurst(enemyMesh.position, profile.color, profile.boss ? 44 : 30, profile.boss ? 4.4 : 3);
            this.engine.tweens.add(enemyMesh.scale, { x: 0, y: 0, z: 0 }, 0.24, Easing.linear, () => {
                this.engine.scene.remove(enemyMesh);
            });

            this.grid[enemyNode.r][enemyNode.c].entity = null;
            const entIdx = this.engine.entities.findIndex((entity) => entity === enemyObj);
            if (entIdx > -1) this.engine.entities.splice(entIdx, 1);

            await this.sleep(profile.boss ? 1900 : 1400);
            this.hideCombatUI();

            this.currentEnemy = null;
            GameState.phase = 'EXPLORING';
            GameState.updateUI();
            this.exploreNext();
        } else {
            window.soundEngine?.defeat();
            await this.typeText('你倒下了... 飞碟上下层失去同步，护盾完全破碎。');
            this.engine.glitchPass.enabled = true;
            await this.sleep(2000);

            this.hideCombatUI();
            this.engine.glitchPass.enabled = false;
            this.currentEnemy = null;
            this.startLevel();
        }
    }
}

window.onload = () => {
    window.soundEngine = new SoundEngine();
    const unlockAudio = () => window.soundEngine.unlock();
    window.addEventListener('pointerdown', unlockAudio, { passive: true });
    window.addEventListener('keydown', unlockAudio);
    const settingsButton = document.getElementById('btn-settings');
    const settingsPanel = document.getElementById('settings-panel');
    const volumeSlider = document.getElementById('slider-volume');
    const volumeValue = document.getElementById('val-volume');

    const syncVolumeUI = () => {
        const percent = Math.round(window.soundEngine.volume * 100);
        volumeSlider.value = String(percent);
        volumeValue.innerText = `${percent}%`;
    };

    settingsButton.addEventListener('click', async (event) => {
        event.stopPropagation();
        await window.soundEngine.unlock();
        settingsPanel.classList.toggle('hidden');
    });

    settingsPanel.addEventListener('click', (event) => {
        event.stopPropagation();
    });

    document.addEventListener('click', () => {
        settingsPanel.classList.add('hidden');
    });

    volumeSlider.addEventListener('input', async () => {
        await window.soundEngine.unlock();
        window.soundEngine.setVolume(Number(volumeSlider.value) / 100);
        syncVolumeUI();
        window.soundEngine.beep({ freq: 520, slideTo: 700, duration: 0.08, volume: 0.035, type: 'triangle' });
    });

    syncVolumeUI();
    window.engine = new VisualEngine();
    window.gameController = new GameController(window.engine);
    GameState.updateUI();
};
</script>
</body>
</html>
